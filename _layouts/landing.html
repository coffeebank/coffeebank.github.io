<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ site.title }}</title>
    <link href="/home/assets/styles.css" rel="stylesheet">
    <link href="https://unpkg.com/tailwindcss@^1.0/dist/tailwind.min.css" rel="stylesheet">
</head>
<body>
    <div class="w-full h-screen overflow-y-auto bg-fixed bg-center bg-cover bg-blue-900" style="background-image: url(/home/media/jaro-bielik-1483955-unsplash_c02.jpg)">
        <div class="flex flex-wrap w-full justify-center items-center">

            <!-- top card -->
            <div class="w-full pt-12 slide-in-fwd-center">
                <div class="w-11/12 sm:w-4/5 md:w-3/5 lg:w-1/2 xl:w-2/5 max-w-screen-sm mx-auto rounded overflow-hidden bg-white shadow-lg text-center">
                    <div class="px-6 py-4">
                        <img class="w-1/5 m-4 rounded-full shadow-lg mx-auto select-none" src="{{ page.avatar }}" alt="{{ site.title }}" style="min-width:6rem;">
                        <div class="font-bold text-xl mb-2">{{ page.user }}</div>
                        <p class="text-gray-700 text-base">{{ page.bio }}</p>
                    </div>
                    <div class="px-6 py-4 mx-auto">
                        <a href="{{ page.profile }}" rel="noopener">
                            <span class="inline-block bg-gray-200 rounded-full px-3 py-1 text-sm font-semibold text-gray-700 mr-2 select-none"># GitHub</span>
                        </a>
                        {% for badge in page.badges %}
                            <a href="{{ badge.burl }}" rel="noopener">
                                <span class="inline-block bg-gray-200 rounded-full px-3 py-1 text-sm font-semibold text-gray-700 mr-2 select-none"># {{ badge.bname }}</span>
                            </a>
                        {% endfor %}
                    </div>
                  </div>
            </div>

                            </div>

                    </a>
                </div>
            </div> -->

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/uikit@3.4.2/dist/js/uikit.min.js"></script>

</body>
</html>
